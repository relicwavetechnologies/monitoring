name: deploy

on:
  push:
    branches: [main]
  workflow_dispatch:

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository }}

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    steps:
      - uses: actions/checkout@v4

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Buildx
        uses: docker/setup-buildx-action@v3

      - name: Extract image metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}
          tags: |
            type=sha,format=short
            type=raw,value=latest,enable={{is_default_branch}}

      - name: Build and push image
        uses: docker/build-push-action@v6
        with:
          context: .
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
          secrets: |
            database_url=${{ secrets.DATABASE_URL }}

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 10

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm

      - name: Install deps (for prisma config)
        run: pnpm install --frozen-lockfile --ignore-scripts

      # Phase 1: switched from `prisma db push` to `prisma migrate deploy`.
      # The prod DB was originally provisioned by `db push` and so has no
      # `_prisma_migrations` table. The first migrate-deploy run hits Prisma
      # error P3005 ("schema is not empty"). The script below detects that
      # exact case, runs `migrate resolve --applied 0000_baseline` to mark
      # the existing schema as the baseline, then re-runs `migrate deploy`.
      # Subsequent runs find a populated `_prisma_migrations` and skip the
      # resolve step. This makes the deploy self-baselining and idempotent.
      - name: Apply migrations
        env:
          DATABASE_URL: ${{ secrets.DATABASE_URL }}
        run: |
          # Critical: pipefail so `prisma | tee` propagates prisma's exit
          # code instead of tee's. Without this the script always thinks
          # the migration succeeded.
          set -eo pipefail
          OUT=$(mktemp)
          # Disable -e for the first attempt — we need to inspect a
          # failure rather than die on it.
          set +e
          pnpm exec prisma migrate deploy --schema prisma/schema.prisma 2>&1 | tee "$OUT"
          RC=${PIPESTATUS[0]}
          set -e
          if [ "$RC" -eq 0 ]; then
            echo "Migrations applied cleanly."
            exit 0
          fi
          if grep -q 'P3005' "$OUT"; then
            echo "::warning::P3005 detected — baselining 0000_baseline against existing schema and retrying."
            pnpm exec prisma migrate resolve --applied 0000_baseline --schema prisma/schema.prisma
            pnpm exec prisma migrate deploy --schema prisma/schema.prisma
            exit 0
          fi
          echo "Migration failed for a non-P3005 reason — see logs above."
          exit "$RC"

      - name: Deploy over SSH
        uses: appleboy/ssh-action@v1
        with:
          host: ${{ secrets.SSH_HOST }}
          username: ${{ secrets.SSH_USER }}
          key: ${{ secrets.SSH_KEY }}
          port: ${{ secrets.SSH_PORT || 22 }}
          envs: REGISTRY,IMAGE_NAME
          script: |
            set -euo pipefail
            cd /opt/visa-monitoring
            echo "${{ secrets.GITHUB_TOKEN }}" | docker login ghcr.io -u ${{ github.actor }} --password-stdin
            export APP_IMAGE="${REGISTRY}/${IMAGE_NAME}:latest"
            docker compose pull app
            docker compose up -d --remove-orphans
            docker image prune -f
