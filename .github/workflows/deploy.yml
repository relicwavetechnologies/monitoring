name: deploy

on:
  push:
    branches: [main]
  workflow_dispatch:

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository }}

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    steps:
      - uses: actions/checkout@v4

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Buildx
        uses: docker/setup-buildx-action@v3

      - name: Extract image metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}
          tags: |
            type=sha,format=short
            type=raw,value=latest,enable={{is_default_branch}}

      - name: Build and push image
        uses: docker/build-push-action@v6
        with:
          context: .
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
          secrets: |
            database_url=${{ secrets.DATABASE_URL }}

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 10

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm

      - name: Install deps (for prisma config)
        run: pnpm install --frozen-lockfile --ignore-scripts

      # Self-healing migrate deploy. Handles three first-time edge cases:
      #   - P3005: schema exists but no _prisma_migrations table (legacy `db push`).
      #            → mark 0000_baseline as applied, retry.
      #   - P3018: a previous deploy left a migration in failed state.
      #            → parse the failed name, mark it rolled-back, retry.
      # On steady state both paths short-circuit immediately. Both recovery
      # actions are explicitly safe: resolve doesn't run SQL, just updates
      # the metadata table.
      - name: Apply migrations
        env:
          DATABASE_URL: ${{ secrets.DATABASE_URL }}
        run: |
          set -eo pipefail
          attempt() {
            local out; out=$(mktemp)
            set +e
            pnpm exec prisma migrate deploy --schema prisma/schema.prisma 2>&1 | tee "$out"
            local rc=${PIPESTATUS[0]}
            set -e
            echo "$rc:$out"
          }

          for i in 1 2 3; do
            res=$(attempt)
            rc=${res%%:*}; out=${res#*:}
            if [ "$rc" -eq 0 ]; then
              echo "Migrations applied cleanly (attempt $i)."
              exit 0
            fi
            if grep -q 'P3005' "$out"; then
              echo "::warning::P3005 — baselining 0000_baseline."
              pnpm exec prisma migrate resolve --applied 0000_baseline --schema prisma/schema.prisma
              continue
            fi
            if grep -q 'P3018' "$out"; then
              # Extract: "Migration name: 0002_phase2a_block_diff"
              failed=$(grep -oE 'Migration name: [0-9_a-zA-Z]+' "$out" | head -n1 | awk '{print $3}')
              if [ -n "$failed" ]; then
                echo "::warning::P3018 — rolling back $failed and retrying."
                pnpm exec prisma migrate resolve --rolled-back "$failed" --schema prisma/schema.prisma
                continue
              fi
            fi
            echo "Migration failed for a non-recoverable reason — see logs above."
            exit "$rc"
          done
          echo "Migrations did not converge after 3 attempts."
          exit 1

      - name: Deploy over SSH
        uses: appleboy/ssh-action@v1
        with:
          host: ${{ secrets.SSH_HOST }}
          username: ${{ secrets.SSH_USER }}
          key: ${{ secrets.SSH_KEY }}
          port: ${{ secrets.SSH_PORT || 22 }}
          envs: REGISTRY,IMAGE_NAME
          script: |
            set -euo pipefail
            cd /opt/visa-monitoring
            echo "${{ secrets.GITHUB_TOKEN }}" | docker login ghcr.io -u ${{ github.actor }} --password-stdin
            export APP_IMAGE="${REGISTRY}/${IMAGE_NAME}:latest"
            docker compose pull app
            docker compose up -d --remove-orphans
            docker image prune -f
